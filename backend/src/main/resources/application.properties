# ═══════════════════════════════════════════════════════════════
# Community Digital Banking Platform – Application Configuration
# ═══════════════════════════════════════════════════════════════

# ── Application ──
spring.application.name=community-digital-banking

# ── MySQL Database (Aiven Cloud) ──
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── JPA / Hibernate ──
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# ── SQL Init ──
spring.sql.init.mode=always
spring.sql.init.continue-on-error=true

# ── Server (Render dynamic port support) ──
server.port=${PORT:8080}

# ── JWT Configuration ──
jwt.secret=${JWT_SECRET}
jwt.expiration_ms=86400000

# ── Logging ──
logging.level.com.banking.platform=INFO
logging.level.org.springframework.security=WARN